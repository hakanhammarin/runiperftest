# Mosquitto configuration for NetMon
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Allow anonymous by default (set allow_anonymous false and add password_file for production)
allow_anonymous true

# Uncomment for authenticated access:
# allow_anonymous false
# password_file /mosquitto/config/passwd
